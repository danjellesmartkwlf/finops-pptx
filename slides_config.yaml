  # OpEx by Workspace
  - type: table
    layout: title_only
    title: "AWN Databricks OpEx by Workspace"
    requires: dbx_data.opex_by_workspace
    data_source: "dbx_data.opex_by_workspace"
    totals_source: "dbx_data.opex_by_workspace_totals"
