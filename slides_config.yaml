  # COGS by Workspace
  - type: table
    layout: title_only
    title: "AWN Databricks COGS by Workspace"
    requires: dbx_data.cogs_by_workspace
    data_source: "dbx_data.cogs_by_workspace"
    totals_source: "dbx_data.cogs_by_workspace_totals"
