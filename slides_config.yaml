  # ===========================================================================
  # COGS Unit Economics
  # ===========================================================================

  - type: transition
    layout: transition
    title: "COGS Unit Economics"
    requires: unit_cost_data

  - type: chart
    layout: title_only
    title: "COGS vs Analyzed Observations"
    bucket: "unit_cost_overview"
    requires: unit_cost_data

  - type: chart
    layout: title_only
    title: "Cost per 1M Analyzed Observations"
    bucket: "cost_per_1m_trend"
    requires: unit_cost_data

  - type: table
    layout: title_only
    title: "Pod Unit Economics: MoM Comparison"
    requires: unit_cost_data
    data_source: "unit_cost_data.pod_mom"
    headers: ["Pod", "COGS", "COGS MoM", "Analyzed Obs", "Obs MoM", "Cost/1M", "Cost/1M MoM"]
    col_widths: [1.6, 1.8, 1.6, 2.0, 1.6, 1.6, 1.6]
    font_size: 16
    columns:
      - field: pod
        format: raw
      - field: curr_cogs
        format: abbreviated_currency
      - field: cogs_pct
        format: signed_percentage
      - field: curr_obs
        format: obs_abbreviated
      - field: obs_pct
        format: signed_percentage
      - field: curr_unit_cost
        format: unit_cost
      - field: unit_cost_pct
        format: signed_percentage

  - type: chart
    layout: title_only
    title: "Cost per 1M Analyzed by Pod"
    bucket: "pod_unit_cost_trend"
    requires: unit_cost_data

  # ===========================================================================
  # Data Platform
  # ===========================================================================

  - type: transition
    layout: transition
    title: "Data Platform"
    requires: data_platform_data

  - type: chart
    layout: title_only
    title: "Data Platform: Total Monthly Spend"
    bucket: "data_platform_total"
    requires: data_platform_data

  - type: chart
    layout: title_only
    title: "Data Platform: Spend by Application"
    bucket: "data_platform_stacked"
    requires: data_platform_data

  - type: history_table
    layout: title_only
    title: "Data Platform: Application Spend"
    requires: data_platform_data
    data_source: "data_platform_data.table_rows"
    month_labels_source: "data_platform_data.month_labels"
    totals_source: "data_platform_data.table_totals"
    col_widths: [2.0, 1.2, 1.2, 1.2, 1.2, 1.2, 1.2, 1.55, 1.55]
    font_size: 13

  # ===========================================================================
  # AWN Databricks Spend
  # ===========================================================================

  - type: transition
    layout: transition
    title: "AWN Databricks Spend"
    requires: dbx_data

  - type: summary_table
    layout: title_only
    title: "AWN Databricks: MoM Cost Comparison"
    data_key: "dbx_summary_data"
    whole_numbers: true
    col_widths: [3.0, 2.3, 2.3, 2.3, 2.4]
