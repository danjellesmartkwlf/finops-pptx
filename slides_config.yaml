        format: raw
      - field: previous_month
        format: abbreviated_currency
      - field: current_month
        format: abbreviated_currency
      - field: delta_cost
        format: abbreviated_currency
      - field: mom_pct
        format: signed_percentage
        fallback_field: mom_label
    totals_columns:
      - field: null
        text: "Total"
      - field: previous_month
        format: abbreviated_currency
      - field: current_month
        format: abbreviated_currency
      - field: delta_cost
        format: abbreviated_currency
      - field: mom_pct
        format: signed_percentage

  # COGS by SKU
  - type: table
    layout: title_only
    title: "AWN Databricks COGS by SKU"
    requires: dbx_data.cogs_by_sku
    data_source: "dbx_data.cogs_by_sku"
    totals_source: "dbx_data.cogs_by_sku_totals"
    headers: ["SKU", "{prev_month}", "{curr_month}", "Change $", "Change %"]
    col_widths: [4.0, 2.0, 2.0, 2.0, 2.3]
    font_size: 14
    columns:
      - field: dimension_value
        format: raw
      - field: previous_month
        format: abbreviated_currency
      - field: current_month
        format: abbreviated_currency
      - field: delta_cost
        format: abbreviated_currency
      - field: mom_pct
        format: signed_percentage
        fallback_field: mom_label
    totals_columns:
      - field: null
        text: "Total"
      - field: previous_month
        format: abbreviated_currency
      - field: current_month
        format: abbreviated_currency
