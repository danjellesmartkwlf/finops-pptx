# =============================================================================
# Arctic Wolf Corporate Template - Slide Layout Index
# Template: pptx_template/template1.pptx
# Total Layouts: 37 (slideLayout1 through slideLayout37)
# Slide Dimensions: 13.33" x 7.5" (widescreen 16:9)
# All positions/sizes in inches. Placeholder idx values are 0-based OOXML indices.
# =============================================================================
#
# Common placeholders present on most layouts (omitted from individual entries):
#   - slide_number: type=sldNum, idx=4, pos=(11.92, 7.05), size=(0.39, 0.20)
#   - footer:       type=ftr,    idx=3, pos=(3.19, 7.12),  size=(2.87, 0.13), default_text="Public"
#
# Slide-to-layout mapping for the 6 sample slides in the template:
#   slide 1 -> slideLayout1  (Title Slide A)
#   slide 2 -> slideLayout9  (Transition Slide B)
#   slide 3 -> slideLayout13 (Title, Body)
#   slide 4 -> slideLayout24 (Title Only)
#   slide 5 -> slideLayout16 (Title, Subtitle, 2 Col Box)
#   slide 6 -> slideLayout24 (Title Only)
# =============================================================================

